spring.application.name=appointment

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI spec path to /api
springdoc.api-docs.path=/api

# Sync Swagger UI to load from the  /api path
springdoc.swagger-ui.url=/api


# Ensure Hibernate creates the tables before the data.sql runs
spring.jpa.defer-datasource-initialization=true

# Set to 'always' to ensure seeding runs every time (common for H2)
spring.sql.init.mode=always

# If you use PostgreSQL locally, ensure it doesn't fail on existing data
spring.sql.init.continue-on-error=true