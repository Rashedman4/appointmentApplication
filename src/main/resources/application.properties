spring.application.name=appointment

# H2 in-memory DB
spring.datasource.url=jdbc:h2:mem:appdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# OpenAPI spec path to /api
springdoc.api-docs.path=/api
springdoc.swagger-ui.url=/api

# Ensure Hibernate creates the tables before the data.sql runs
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

application.security.jwt.secret-key=ab609dea691f33fcec3b70fba10a10d717e749ee90372dc81a5559eb386c8906
application.security.jwt.expiration=86400000
